<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Receipts</title>
<link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
  </div>

  <header class="topbar">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 3v18l2-1.5L10 21l2-1.5L14 21l2-1.5L18 21V3l-2 1.5L14 3l-2 1.5L10 3 8 4.5 6 3Z"/>
        <path d="M9 8h6"/>
        <path d="M9 12h6"/>
        <path d="M9 16h4"/>
      </svg>
      <span class="title">Receipts</span>
    </div>
    <div class="topbar-actions">
      <button id="theme-btn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>
        </svg>
      </button>
      <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/>
        </svg>
      </button>
    </div>
  </header>

  <section class="filterbar glass">
    <label class="searchbox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"/>
        <path d="m20 20-3.5-3.5"/>
      </svg>
      <input id="q" type="search" placeholder="Search merchant or item…" autocomplete="off" spellcheck="false">
    </label>
    <button id="filter-toggle" class="icon-btn" title="Filters" aria-label="Toggle filters" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 5h16"/>
        <path d="M7 12h10"/>
        <path d="M10 19h4"/>
      </svg>
    </button>
  </section>

  <section id="filter-panel" class="filter-panel glass" hidden>
    <div class="filter-grid">
      <label class="field">
        <span>Merchant</span>
        <select id="f-merchant"><option value="*">All</option></select>
      </label>
      <label class="field">
        <span>Country</span>
        <select id="f-country"><option value="*">All</option></select>
      </label>
      <label class="field">
        <span>Currency</span>
        <select id="f-currency"><option value="*">All</option></select>
      </label>
      <label class="field">
        <span>From</span>
        <input id="f-from" type="date">
      </label>
      <label class="field">
        <span>To</span>
        <input id="f-to" type="date">
      </label>
      <label class="field">
        <span>Display in</span>
        <select id="f-display"><option value="AUTO">Native</option></select>
      </label>
      <button id="f-reset" class="ghost-btn" type="button">Reset</button>
    </div>
  </section>

  <main id="root" class="content"></main>
  <footer class="footer"><span class="version">v0.1.0</span><span id="result-count" class="result-count"></span></footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
